openapi: 3.0.0
info:
  title: LTX-2 Video API
  description: Async-first text-to-video and image-to-video generation using the local LTX-2.3 server.
  version: 1.1.0
servers:
  - url: http://192.168.1.26:8004
    description: Local LTX-2 Video Server

paths:
  /v1/video/async_t2v:
    post:
      summary: Async text-to-video
      description: Submit a text-to-video generation task and receive a task_id for polling.
      operationId: asyncTextToVideo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - prompt
              properties:
                prompt:
                  type: string
                height:
                  type: integer
                  default: 512
                  description: Video height. Must be a multiple of 64.
                width:
                  type: integer
                  default: 768
                  description: Video width. Must be a multiple of 64.
                num_frames:
                  type: integer
                  default: 121
                  description: Number of frames. Shorter clips stay cleaner locally.
                frame_rate:
                  type: number
                  default: 24.0
                num_inference_steps:
                  type: integer
                  default: 20
                seed:
                  type: integer
                  default: 42
                negative_prompt:
                  type: string
                enhance_prompt:
                  type: boolean
                  default: true
                cfg_scale_video:
                  type: number
                  default: 3.0
                stg_scale_video:
                  type: number
                  default: 1.0
                cfg_scale_audio:
                  type: number
                  default: 7.0
                modality_scale:
                  type: number
                  default: 3.0
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                    example: processing
                  message:
                    type: string

  /v1/video/async_i2v:
    post:
      summary: Async image-to-video
      description: Submit an image-to-video generation task and receive a task_id for polling.
      operationId: asyncImageToVideo
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - prompt
                - image
              properties:
                prompt:
                  type: string
                image:
                  type: string
                  format: binary
                height:
                  type: integer
                  default: 512
                width:
                  type: integer
                  default: 768
                num_frames:
                  type: integer
                  default: 121
                frame_rate:
                  type: number
                  default: 24.0
                num_inference_steps:
                  type: integer
                  default: 20
                seed:
                  type: integer
                  default: 42
                negative_prompt:
                  type: string
                enhance_prompt:
                  type: boolean
                  default: true
                cfg_scale_video:
                  type: number
                  default: 3.0
                stg_scale_video:
                  type: number
                  default: 1.0
      responses:
        '200':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                    example: processing
                  message:
                    type: string

  /v1/video/tasks/{task_id}:
    get:
      summary: Poll task status
      operationId: pollTaskStatus
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  url:
                    type: string
                  error:
                    type: string

  /outputs/{filename}:
    get:
      summary: Download generated video
      operationId: downloadOutput
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: MP4 file

  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: running
                  device:
                    type: string
                    example: cuda
                  vram_loaded:
                    type: boolean

  /v1/internal/unload:
    post:
      summary: Unload model
      operationId: unloadModel
      responses:
        '200':
          description: Model unloaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: models unloaded
    get:
      summary: Unload model (GET)
      operationId: unloadModelGet
      responses:
        '200':
          description: Model unloaded
